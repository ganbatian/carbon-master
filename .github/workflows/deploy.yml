name: Deploy to GitHub Pageson:  push:    branches: [main]  workflow_dispatch:permissions:  contents: read  pages: write  id-token: writejobs:  build-and-deploy:    runs-on: ubuntu-latest    steps:      - name: Checkout        uses: actions/checkout@v4      - name: Install Node.js        run: |          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -          apt-get install -y nodejs          node --version          npm --version      - name: Install dependencies        run: npm ci      - name: Build        run: npm run build      - name: Upload artifact        uses: actions/upload-pages-artifact@v3        with:          path: ./dist      - name: Deploy        uses: actions/deploy-pages@v4