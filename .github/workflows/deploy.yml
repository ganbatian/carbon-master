name: Deploy to GitHub Pageson:  push:    branches: [main]  workflow_dispatch:permissions:  contents: read  pages: write  id-token: writejobs:  build-and-deploy:    runs-on: ubuntu-latest    steps:      - name: Checkout        uses: actions/checkout@v4      - name: Setup Node        uses: actions/setup-node@v4        with:          node-version: lts      - name: Install        run: |          npm ci      - name: Build        run: |          npm run build      - name: Upload artifact        uses: actions/upload-pages-artifact@v3        with:          path: ./dist      - name: Deploy        uses: actions/deploy-pages@v4