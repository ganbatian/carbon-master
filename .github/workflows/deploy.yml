name: Deploy to GitHub Pageson:  push:    branches: [main]  workflow_dispatch:jobs:  build-and-deploy:    runs-on: ubuntu-latest    steps:      - name: Checkout        uses: actions/checkout@v4      - name: Setup Node        uses: actions/setup-node@v3        with:          node-version: '18'      - name: Install        run: npm ci      - name: Build        run: npm run build      - name: Deploy to GitHub Pages        uses: JamesIves/github-pages-deploy-action@v4        with:          token: ${{ secrets.GITHUB_TOKEN }}          folder: dist          branch: gh-pages